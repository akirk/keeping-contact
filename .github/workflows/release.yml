name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin zip
        run: |
          mkdir -p build
          rsync -av --exclude='build' --exclude='.git' --exclude='.github' --exclude='CLAUDE.md' . build/keeping-contact/
          cd build && zip -r keeping-contact.zip keeping-contact

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/keeping-contact.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
